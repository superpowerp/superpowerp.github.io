<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FN Item Shop & Database</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanakit:wght@400;600;700&display=swap');
        body {
            font-family: 'Kanakit', sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* สีตามระดับความหายากของไอเท็ม (Rarity) */
        .rarity-legendary { background: linear-gradient(135deg, #fb923c, #ea580c); }
        .rarity-epic { background: linear-gradient(135deg, #c084fc, #7e22ce); }
        .rarity-rare { background: linear-gradient(135deg, #60a5fa, #1d4ed8); }
        .rarity-uncommon { background: linear-gradient(135deg, #4ade80, #15803d); }
        .rarity-common { background: linear-gradient(135deg, #9ca3af, #4b5563); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid px-3 py-2 bg-blue-600 rounded-lg fa-gamepad text-2xl text-white animate-pulse"></i>
                <h1 class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">FORTNITE SHOP & ITEMS</h1>
            </div>
            <!-- ระบบเปลี่ยนแท็ปเมนู -->
            <nav class="flex bg-gray-950 p-1 rounded-xl border border-gray-850">
                <button onclick="switchTab('shop-tab')" id="btn-shop-tab" class="tab-btn px-5 py-2 rounded-lg font-semibold text-sm transition-all bg-blue-600 text-white">
                    <i class="fa-solid fa-store mr-2"></i> Shop Today
                </button>
                <button onclick="switchTab('search-tab')" id="btn-search-tab" class="tab-btn px-5 py-2 rounded-lg font-semibold text-sm transition-all text-gray-400 hover:text-white">
                    <i class="fa-solid fa-magnifying-glass mr-2"></i> Search Items
                </button>
                <button onclick="switchTab('new-tab')" id="btn-new-tab" class="tab-btn px-5 py-2 rounded-lg font-semibold text-sm transition-all text-gray-400 hover:text-white">
                    <i class="fa-solid fa-sparkles mr-2"></i> New Items
                </button>
            </nav>
        </div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-8">
        
        <!-- Loading Indicator -->
        <div id="loading" class="text-center py-20">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
            <p class="text-gray-400 text-lg">กำลังดึงข้อมูลเรียลไทม์จาก Fortnite-API...</p>
        </div>

        <!-- แท็ปที่ 1: Shop Today -->
        <section id="shop-tab" class="tab-content active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold border-l-4 border-blue-500 pl-3">ไอเท็มที่วางขายประจำวัน</h2>
                <span id="shop-hash" class="text-xs text-gray-500 bg-gray-900 px-3 py-1 rounded-full border border-gray-800"></span>
            </div>
            <div id="shop-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- แท็ปที่ 2: Search Items -->
        <section id="search-tab" class="tab-content">
            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 mb-8">
                <h2 class="text-xl font-bold mb-4"><i class="fa-solid fa-search text-blue-500 mr-2"></i>ค้นหาฐานข้อมูลไอเท็มทั้งหมด</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="search-input" placeholder="พิมพ์ชื่อไอเท็มภาษาอังกฤษ เช่น Aura, Midas..." class="flex-grow bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                    <button onclick="searchItem()" class="bg-blue-600 hover:bg-blue-700 font-bold px-8 py-3 rounded-xl transition-all shadow-lg shadow-blue-900/40">
                        ค้นหาไอเท็ม
                    </button>
                </div>
                <div id="search-error" class="text-red-400 mt-3 text-sm hidden"></div>
            </div>
            <div id="search-result" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="col-span-full text-center py-10 text-gray-500">
                    <i class="fa-solid fa-box-open text-4xl mb-2"></i>
                    <p>กรุณากรอกชื่อไอเท็มเพื่อเริ่มต้นการค้นหา</p>
                </div>
            </div>
        </section>

        <!-- แท็ปที่ 3: New Items -->
        <section id="new-tab" class="tab-content">
            <h2 class="text-xl font-bold border-l-4 border-purple-500 pl-3 mb-6">ไอเท็มอัปเดตใหม่ล่าสุดในแพทช์นี้</h2>
            <div id="new-items-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-950 border-t border-gray-900 py-6 text-center text-sm text-gray-500">
        <p>สร้างโดยการเชื่อมโยงข้อมูลตรงกับ <a href="https://fortnite-api.com" target="_blank" class="text-blue-500 hover:underline">Fortnite-API</a></p>
    </footer>

    <!-- JavaScript สำหรับควบคุมเว็บ -->
    <script>
       // ฟังก์ชันสลับแท็บเมนู
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-gray-400', 'hover:text-white');
            });

            document.getElementById(tabId).classList.add('active');
            const activeBtn = document.getElementById(`btn-${tabId}`);
            activeBtn.classList.remove('text-gray-400', 'hover:text-white');
            activeBtn.classList.add('bg-blue-600', 'text-white');
        }

        // ฟังก์ชันสร้างการ์ดสินค้า
        function createItemCard(name, description, rarity, price, image, type) {
            // ป้องกันกรณีค่า rarity หรือค่าอื่นๆ เป็น null
            const safeRarity = rarity ? rarity.toString() : 'Common';
            const rarityClass = `rarity-${safeRarity.toLowerCase()}`;
            const safeName = name || 'Unknown Item';
            const safeDesc = description || 'ไม่มีคำอธิบายเพิ่มเติมสำหรับไอเท็มนี้';
            const safeType = type || 'Cosmetic';
            
            return `
                <div class="bg-gray-900 rounded-2xl overflow-hidden border border-gray-800 shadow-xl transition-all hover:-translate-y-1 hover:border-gray-700 flex flex-col">
                    <div class="relative ${rarityClass} p-2 aspect-square flex items-center justify-center overflow-hidden">
                        <img src="${image || 'https://placehold.co/300?text=No+Image'}" alt="${safeName}" class="w-full h-full object-contain drop-shadow-2xl" loading="lazy">
                        <span class="absolute top-3 right-3 text-xs font-bold uppercase tracking-wider bg-black/60 px-2.5 py-1 rounded-md text-white border border-white/10">
                            ${safeType}
                        </span>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-lg text-white line-clamp-1 mb-1">${safeName}</h3>
                            <p class="text-gray-400 text-xs line-clamp-2 min-h-[2rem]">${safeDesc}</p>
                        </div>
                        <div class="flex justify-between items-center mt-4 pt-3 border-t border-gray-800">
                            <span class="text-xs font-semibold px-2.5 py-0.5 rounded ${rarityClass} text-white">
                                ${safeRarity}
                            </span>
                            <div class="flex items-center gap-1.5 font-bold text-yellow-400 text-md bg-yellow-400/10 px-3 py-1 rounded-lg">
                                <i class="fa-solid fa-coins"></i>
                                ${price ? price.toLocaleString() : '0'}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ฟังก์ชันส่วนกลางสำหรับดึงข้อมูลผ่าน Proxy หลายตัว (หากตัวแรกพัง จะสลับไปตัวสำรองทันที)
        async function fetchWithProxy(targetUrl) {
            // รายการ Proxies ที่เสถียร
            const proxies = [
                (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`
            ];

            let lastError = null;
            for (const proxyFn of proxies) {
                try {
                    const proxyUrl = proxyFn(targetUrl);
                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    return data;
                } catch (e) {
                    console.warn(`Proxy failed, trying next one... Error: ${e.message}`);
                    lastError = e;
                }
            }
            throw lastError; // ถ้าพังหมดทุกตัวให้โยน Error ออกไป
        }

        // ดึงข้อมูล BR Shop
        async function fetchShopData() {
            const shopContainer = document.getElementById('shop-container');
            try {
                const json = await fetchWithProxy('https://fortnite-api.com/v2/shop/br');
                
                if (json && json.status === 200 && json.data) {
                    document.getElementById('shop-hash').innerText = `Shop Hash: ${json.data.hash || 'Updated'}`;
                    
                    let htmlContent = '';
                    let entries = [];
                    
                    // รวบรวมข้อมูลอย่างปลอดภัยจากทุกหมวดหมู่ที่มีใน Shop วันนั้นๆ
                    if (json.data.featured && json.data.featured.entries) entries = entries.concat(json.data.featured.entries);
                    if (json.data.daily && json.data.daily.entries) entries = entries.concat(json.data.daily.entries);
                    if (json.data.votes && json.data.votes.entries) entries = entries.concat(json.data.votes.entries);
                    
                    // ป้องกันกรณีกรอบข้อมูลใหม่อื่นๆ (เช่น มัดรวมพิเศษ)
                    for (const key in json.data) {
                        if (json.data[key] && json.data[key].entries && Array.isArray(json.data[key].entries) && key !== 'featured' && key !== 'daily') {
                            entries = entries.concat(json.data[key].entries);
                        }
                    }

                    if (entries.length === 0) {
                        shopContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">ไม่พบสินค้าเปิดขายในระบบขณะนี้</div>`;
                        return;
                    }

                    // ป้องกันไอเท็มซ้ำซ้อนในหน้าร้านค้า
                    const seenItems = new Set();

                    entries.forEach(entry => {
                        if (entry.items && entry.items.length > 0) {
                            const item = entry.items[0]; 
                            if (item && !seenItems.has(item.id)) {
                                seenItems.add(item.id);
                                
                                // หาภาพที่สวยที่สุดมาแสดง
                                const itemImage = item.images.featured || item.images.icon || item.images.smallIcon;
                                
                                htmlContent += createItemCard(
                                    item.name,
                                    item.description,
                                    item.rarity ? item.rarity.value : 'Common',
                                    entry.finalPrice,
                                    itemImage,
                                    item.type ? item.type.displayValue : 'Cosmetic'
                                );
                            }
                        }
                    });
                    
                    shopContainer.innerHTML = htmlContent || `<div class="col-span-full text-center text-gray-500 py-10">ไม่สามารถแปลงข้อมูลไอเท็มได้</div>`;
                } else {
                    throw new Error("Invalid API structure response");
                }
            } catch (error) {
                console.error("Error fetching shop data:", error);
                shopContainer.innerHTML = `
                    <div class="col-span-full text-center py-10 bg-red-950/20 border border-red-900 rounded-xl p-6">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 text-4xl mb-3"></i>
                        <p class="text-red-400 font-semibold">ขออภัย! ระบบ Proxy ข้อมูลขัดข้องชั่วคราว</p>
                        <p class="text-gray-500 text-xs mt-1">บราวเซอร์บล็อก CORS หรือเซิร์ฟเวอร์ตอบรับช้า กรุณากดรีเฟรชหน้าเว็บใหม่อีกครั้งครับ</p>
                    </div>
                `;
            }
        }

        // ดึงข้อมูลไอเท็มมาใหม่ (New Items)
        async function fetchNewItems() {
            const container = document.getElementById('new-items-container');
            try {
                const json = await fetchWithProxy('https://fortnite-api.com/v2/cosmetics/br/new');
                
                if (json && json.status === 200 && json.data) {
                    let htmlContent = '';
                    const items = json.data.items || [];
                    
                    if (items.length === 0) {
                        container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">ยังไม่มีไอเท็มใหม่ในแพทช์นี้</div>`;
                        return;
                    }

                    items.slice(0, 24).forEach(item => {
                        const itemImage = item.images.icon || item.images.featured || item.images.smallIcon;
                        htmlContent += createItemCard(
                            item.name,
                            item.description,
                            item.rarity ? item.rarity.value : 'Common',
                            0, 
                            itemImage,
                            item.type ? item.type.displayValue : 'Cosmetic'
                        );
                    });
                    container.innerHTML = htmlContent;
                }
            } catch (error) {
                console.error("Error fetching new items:", error);
                container.innerHTML = `<div class="col-span-full text-center text-gray-600 py-10">ไม่สามารถโหลดไอเท็มมาใหม่ได้ในขณะนี้</div>`;
            }
        }

        // ค้นหาไอเท็ม (Search Function)
        async function searchItem() {
            const query = document.getElementById('search-input').value.trim();
            const errorDiv = document.getElementById('search-error');
            const resultContainer = document.getElementById('search-result');
            
            if (!query) {
                errorDiv.innerText = 'กรุณาใส่ชื่อไอเท็มที่ต้องการค้นหา';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            errorDiv.classList.add('hidden');
            resultContainer.innerHTML = `<div class="col-span-full text-center py-10"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i></div>`;
            
            try {
                const json = await fetchWithProxy(`https://fortnite-api.com/v2/cosmetics/br/search/all?name=${encodeURIComponent(query)}`);
                
                if (json && json.status === 200 && json.data && Array.isArray(json.data)) {
                    let htmlContent = '';
                    json.data.slice(0, 24).forEach(item => {
                        const itemImage = item.images.icon || item.images.smallIcon || item.images.featured;
                        htmlContent += createItemCard(
                            item.name,
                            item.description,
                            item.rarity ? item.rarity.value : 'Common',
                            0,
                            itemImage,
                            item.type ? item.type.displayValue : 'Cosmetic'
                        );
                    });
                    resultContainer.innerHTML = htmlContent;
                } else {
                    resultContainer.innerHTML = `
                        <div class="col-span-full text-center py-10 text-gray-500">
                            <i class="fa-solid fa-triangle-exclamation text-yellow-500 text-4xl mb-2"></i>
                            <p>ไม่พบไอเท็มชื่อ "${query}" ในระบบ ลองเช็คตัวสะกดภาษาอังกฤษอีกครั้งครับ</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error searching item:", error);
                resultContainer.innerHTML = `
                    <div class="col-span-full text-center py-10 text-gray-500">
                        <i class="fa-solid fa-circle-xmark text-red-500 text-4xl mb-2"></i>
                        <p>ไม่พบไอเท็มที่ค้นหา หรือระบบการค้นหาขัดข้องชั่วคราว</p>
                    </div>
                `;
            }
        }

        // โหลดข้อมูลอัตโนมัติเมื่อเปิดหน้าเว็บ
        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('loading').classList.remove('hidden');
            // รันการดึงข้อมูล
            await Promise.all([fetchShopData(), fetchNewItems()]);
            document.getElementById('loading').classList.add('hidden');
            
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchItem();
                }
            });
        });
    </script>
</body>
</html>
